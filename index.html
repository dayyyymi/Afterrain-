<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบจองโต๊ะ 6/10</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:"Prompt",sans-serif;
    background:#f4f7ff;
}

h1{
    text-align:center;
    color:#4b5cff;
}

.desc{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

.login-box{
    background:white;
    max-width:420px;
    margin:auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border-radius:12px;
    border:2px solid #dfe3ff;
    box-sizing:border-box;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#4b5cff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#3545e0;
}

.room{
    display:none;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
    margin-top:35px;
}

.zone{
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.zone h2{
    text-align:center;
}

.tables{
    display:grid;
    grid-template-columns:repeat(3,85px);
    gap:12px;
    justify-content:center;
}

.table{
    width:85px;
    height:85px;
    border-radius:15px;
    background:#dff7df;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
    font-size:12px;
    padding:5px;
}

.table:hover{
    transform:scale(1.05);
}

.reserved{
    background:#ff8fab;
    color:white;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
}

.modal-box{
    background:white;
    width:320px;
    border-radius:20px;
    padding:25px;
    text-align:center;
}

.loading{
    display:none;
    margin-top:18px;
}

.spinner{
    width:48px;
    height:48px;
    border:5px solid #ddd;
    border-top:5px solid #4b5cff;
    border-radius:50%;
    margin:auto;
    animation:spin 0.8s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.small{
    margin-top:10px;
    color:#666;
    font-size:13px;
}

.error{
    margin-top:10px;
    color:#ff4d6d;
    font-size:14px;
    text-align:center;
    display:none;
}

</style>
</head>

<body>
=
<h1>🍽️ ระบบจองโต๊ะ อิยาห์😏🤑</h1>

<div class="desc">
39 โต๊ะ • นักเรียน 37 คน • โต๊ะว่าง 2 โต๊ะ
</div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">

    <h2>เข้าสู่ระบบ</h2>

    <input type="text" id="room" placeholder="กรอกเลขห้อง">

    <input type="text" id="name" placeholder="กรอกชื่อเล่น">

    <input type="text" id="number" placeholder="กรอกเลขที่">

    <button onclick="login()">
        เข้าสู่ระบบ
    </button>

    <div class="error" id="errorText">
        ❌ ข้อมูลผิดพลาด กรุณาตรวจสอบอีกครั้ง
    </div>

    <div class="loading" id="loginLoading">

        <div class="spinner"></div>

        <div class="small">
            กรุณารอสักครู่...<br>
            กำลังตรวจสอบข้อมูล
        </div>

    </div>

</div>

<!-- ROOM -->
<div class="room" id="roomView">

    <!-- หน้าต่าง -->
    <div class="zone">

        <h2>🪟 ติดหน้าต่าง</h2>

        <div class="tables" id="windowZone"></div>

    </div>

    <!-- กลาง -->
    <div class="zone">

        <h2>⭐ ตรงกลาง</h2>

        <div class="tables" id="middleZone"></div>

    </div>

    <!-- ประตู -->
    <div class="zone">

        <h2>🚪 ติดประตู</h2>

        <div class="tables" id="doorZone"></div>

    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

    <div class="modal-box">

        <h2>ยืนยันการจอง</h2>

        <p id="tableInfo"></p>

        <button onclick="confirmBooking()">
            ยืนยันจองโต๊ะ
        </button>

        <div class="loading" id="bookingLoading">

            <div class="spinner"></div>

            <div class="small">
                กรุณารอสักครู่...<br>
                กำลังบันทึกข้อมูล
            </div>

        </div>

    </div>

</div>

<script>

const validNames = [
"เฟสบุ๊ค","พรีเมียร์","ปุณณ์","เคอร์ฟิวส์","มีฟา","ก๋วยเจ๋ง",
"ปิงปอง","พอตเตอร์","ก้าวไกล","ฮิวโก้","นักคิด","เวิร์ค",
"เฟิร์ส","ปกป้อง","โบ๊ท","อิคคิว","อันดา","ออกัส",
"เจ้าขุน","โอโซน","ภูมิ","เกรซ","เปียโน","หย่งหยี",
"นาขวัญ","เพียงออ","ไอเดีย","ปลายฟ้า","เอมิ","น่านฟ้า",
"ฟางข้าว","ฟ้าใส","ข้าวแฟร์","วีด้า","ฟาร์ม","ทอฝัน","ชาร์มมิ่ง"
];

let currentUser = "";
let currentNumber = "";
let selectedTable = null;

// สร้างโต๊ะ 13 โต๊ะต่อโซน
createTables("windowZone",13);
createTables("middleZone",13);
createTables("doorZone",13);

function createTables(zoneId,total){

    const zone = document.getElementById(zoneId);

    for(let i=1;i<=total;i++){

        const table = document.createElement("div");

        table.className = "table";

        table.innerHTML = `
            <div>
                โต๊ะ ${i}<br>
                ว่าง
            </div>
        `;

        table.onclick = ()=>openModal(table);

        zone.appendChild(table);
    }

}

function login(){

    const room = document.getElementById("room").value.trim();
    const name = document.getElementById("name").value.trim();
    const number = document.getElementById("number").value.trim();

    const loading = document.getElementById("loginLoading");
    const error = document.getElementById("errorText");

    error.style.display = "none";

    if(room === "" || name === "" || number === ""){
        error.style.display = "block";
        return;
    }

    loading.style.display = "block";

    setTimeout(()=>{

        if(room !== "6/10" || !validNames.includes(name)){

            loading.style.display = "none";
            error.style.display = "block";

            return;
        }

        currentUser = name;
        currentNumber = number;

        loading.style.display = "none";

        document.getElementById("loginBox").style.display = "none";

        document.getElementById("roomView").style.display = "flex";

    },2000);

}

function openModal(table){

    if(table.classList.contains("reserved")){
        alert("โต๊ะนี้ถูกจองแล้ว");
        return;
    }

    selectedTable = table;

    document.getElementById("modal").style.display = "flex";

    document.getElementById("tableInfo").innerHTML = `
        👤 ${currentUser}<br>
        เลขที่ ${currentNumber}<br><br>
        ต้องการจองโต๊ะนี้ใช่ไหม?
    `;

}

function confirmBooking(){

    const loading = document.getElementById("bookingLoading");

    loading.style.display = "block";

    setTimeout(()=>{

        selectedTable.classList.add("reserved");

        selectedTable.innerHTML = `
            <div>
                ✅<br>
                ${currentUser}<br>
                (${currentNumber})
            </div>
        `;

        loading.style.display = "none";

        document.getElementById("modal").style.display = "none";

    },2000);

}

window.onclick = function(e){

    const modal = document.getElementById("modal");

    if(e.target === modal){
        modal.style.display = "none";
    }

}

</script>

</body>
</html>
